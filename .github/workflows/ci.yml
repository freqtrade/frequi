name: FreqUI CI

on:
  push:
    branches:
      - main
      - ci/**

  pull_request:
    branches:
      - main
  release:
    types: [ published ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build and Test FreqUI
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-24.04 ]
        node: [ "22", "24", "25", "26"]

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false


    - name: Install pnpm
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

    - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: ${{ matrix.node }}
        package-manager-cache: false

    - run: pnpm install

    - name: Build build
      run: pnpm run build

    - name: Run Lint
      run: pnpm run lint-ci

    - name: Run type check
      run: pnpm run typecheck

    - name: Run Tests
      run: pnpm run test:unit

    - name: Archive artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      # Ideally this would upload the zip file from below - but this action currently does not support this.
      with:
        name: freqUI-${{ matrix.node }}
        path: |
          dist
          !dist/**/*.map
        retention-days: 10

    # Playwright section
    - name: Install Playwright Browsers
      run: pnpm exec playwright install --with-deps

    - name: Run Playwright tests
      run: pnpm exec playwright test

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-${{ matrix.node }}
        path: playwright-report/
        retention-days: 30

    # End Playwright section

  release:
    name: Upload Release Binaries
    runs-on: "ubuntu-latest"
    if: github.event_name == 'release'
    needs: build
    permissions:
      contents: write  # Needed to upload release assets.
    steps:
    - name: Download digests
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        path: ./dist/
        # Use node-22 build.
        name: freqUI-22

    - name: Zip files for release
      run: |
        cd dist/
        zip -r ../freqUI.zip .
        cd ../

    - name: Upload release binaries
      uses: alexellis/upload-assets@d8de0b9b956cfb3d7633afdb66ef24c36940a9f7 # 0.5.0
      env:
        GITHUB_TOKEN: ${{ github.token }}
      with:
        asset_paths: '["./freqUI.zip"]'

  call-docker-workflow:
    needs: build
    if: (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'release') && github.repository == 'freqtrade/frequi'
    uses: ./.github/workflows/docker.yml
    permissions:
      packages: write  # Needed to push Docker images to ghcr.
      contents: read
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
